<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleaning Schedule</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧹 Cleaning Schedule</h1>
        </header>

        <main>
            <!-- Date Picker Section -->
            <div class="date-picker-section">
                <label for="datePicker">Select Date:</label>
                <input type="date" id="datePicker">
                <button id="todayBtn" class="btn-today">Today</button>
            </div>

            <!-- Current Date Display -->
            <div class="selected-date">
                <h2 id="selectedDate"></h2>
            </div>

            <!-- Current Schedule Display -->
            <div class="schedule-container">
                <div class="schedule-card kitchen">
                    <div class="card-header">🍳 Kitchen Duty</div>
                    <div class="card-content">
                        <p id="kitchenTask"></p>
                    </div>
                </div>

                <div class="schedule-card bathroom">
                    <div class="card-header">🚿 Bathroom Duty</div>
                    <div class="card-content">
                        <p id="bathroomTask"></p>
                    </div>
                </div>
            </div>

            <!-- Swap Section -->
            <div class="swap-section">
                <h3>🔄 Swap Duty</h3>
                <div class="swap-grid">
                    <div class="swap-field">
                        <label for="swapTaskType">Task</label>
                        <select id="swapTaskType">
                            <option value="kitchen">Kitchen</option>
                            <option value="bathroom">Bathroom</option>
                        </select>
                    </div>

                    <div class="swap-field">
                        <label>Current Assigned</label>
                        <div id="currentAssignee" class="readonly-field">-</div>
                    </div>

                    <div class="swap-field">
                        <label for="replacementPerson">Replacement Person</label>
                        <select id="replacementPerson"></select>
                    </div>
                </div>

                <div class="swap-actions">
                    <button id="applySwapBtn" type="button">Apply Swap</button>
                    <button id="clearSwapBtn" type="button" class="btn-secondary">Clear Swap</button>
                </div>

                <p id="swapStatus" class="swap-status"></p>
            </div>

            <!-- Upcoming Schedule Section -->
            <div class="upcoming-section">
                <h3>📅 Upcoming Schedule (Next 14 Days)</h3>
                <div id="upcomingList" class="upcoming-list"></div>
            </div>
        </main>

        <footer>
            <p>© 2026 Household Cleaning Schedule</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
